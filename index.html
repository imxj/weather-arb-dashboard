<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Arb Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; }
  h1 { font-size: 1.8em; margin-bottom: 5px; }
  .subtitle { color: #8b949e; margin-bottom: 20px; font-size: 0.9em; }
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 16px; text-align: center; }
  .card .label { font-size: 0.75em; color: #8b949e; text-transform: uppercase; }
  .card .value { font-size: 1.6em; font-weight: 700; margin-top: 4px; }
  .card .value.green { color: #3fb950; }
  .card .value.red { color: #f85149; }
  .card .value.yellow { color: #d29922; }
  .card .value.blue { color: #58a6ff; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  th { background: #161b22; color: #8b949e; font-size: 0.75em; text-transform: uppercase; padding: 10px 8px; text-align: left; border-bottom: 1px solid #30363d; }
  td { padding: 10px 8px; border-bottom: 1px solid #21262d; font-size: 0.85em; }
  tr:hover { background: #161b22; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75em; font-weight: 600; }
  .badge.won { background: #238636; color: #fff; }
  .badge.lost { background: #da3633; color: #fff; }
  .badge.pending { background: #9e6a03; color: #fff; }
  .reason { font-size: 0.8em; color: #8b949e; max-width: 250px; }
  .lesson { font-size: 0.75em; color: #f85149; font-style: italic; }
  .section { margin-bottom: 24px; }
  .section h2 { font-size: 1.2em; margin-bottom: 12px; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
  .strategy-list { list-style: none; }
  .strategy-list li { padding: 4px 0; font-size: 0.85em; }
  .strategy-list li::before { content: "✅ "; }
  .backtest-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .bt-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; text-align: center; }
  .bt-card .model { font-weight: 700; font-size: 1.1em; }
  .bt-card .stat { font-size: 0.8em; color: #8b949e; margin-top: 4px; }
  .chart-bar { height: 8px; border-radius: 4px; margin-top: 4px; }
  .updated { text-align: center; color: #484f58; font-size: 0.75em; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
  <h1>🌤️ Weather Arb Dashboard</h1>
  <p class="subtitle">Polymarket weather prediction trading bot — automated via AI agent</p>

  <div class="cards" id="summary-cards"></div>

  <div class="section">
    <h2>📈 Portfolio Value Over Time</h2>
    <canvas id="portfolioChart" height="120"></canvas>
  </div>

  <div class="section">
    <h2>📊 Trade History</h2>
    <table id="trades-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Trade Date</th>
          <th>Market</th>
          <th>Resolves</th>
          <th>Shares</th>
          <th>Cost</th>
          <th>Forecast</th>
          <th>Actual</th>
          <th>P&L</th>
          <th>Status</th>
          <th>Reason</th>
          <th>Link</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="section">
    <h2 id="strategy-title">🧠 Strategy</h2>
    <ul class="strategy-list" id="strategy-list"></ul>
    <div id="strategy-changelog" style="margin-top:12px"></div>
  </div>

  <div class="section">
    <h2>📈 Model Backtest (10 days, 12 cities)</h2>
    <div class="backtest-grid" id="backtest-grid"></div>
  </div>

  <p class="updated" id="updated"></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
fetch('data.json').then(r => r.json()).then(data => {
  // Portfolio chart
  const hist = data.portfolio_history || [];
  if (hist.length > 0) {
    const ctx = document.getElementById('portfolioChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: hist.map(h => h.date),
        datasets: [
          {
            label: 'Total Portfolio',
            data: hist.map(h => h.total),
            borderColor: '#58a6ff',
            backgroundColor: 'rgba(88,166,255,0.1)',
            fill: true,
            tension: 0.3,
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#58a6ff',
          },
          {
            label: 'Cash',
            data: hist.map(h => h.cash),
            borderColor: '#3fb950',
            borderDash: [5, 5],
            tension: 0.3,
            borderWidth: 1.5,
            pointRadius: 3,
            pointBackgroundColor: '#3fb950',
          },
          {
            label: 'Positions Value',
            data: hist.map(h => h.positions_value),
            borderColor: '#d29922',
            borderDash: [3, 3],
            tension: 0.3,
            borderWidth: 1.5,
            pointRadius: 3,
            pointBackgroundColor: '#d29922',
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { labels: { color: '#8b949e', font: { size: 11 } } },
          tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': $' + ctx.parsed.y.toFixed(2) } }
        },
        scales: {
          x: { ticks: { color: '#8b949e' }, grid: { color: '#21262d' } },
          y: {
            ticks: { color: '#8b949e', callback: v => '$' + v },
            grid: { color: '#21262d' },
            suggestedMin: 0,
            suggestedMax: 25,
          }
        }
      }
    });
  }
  // Summary cards
  const resolved = data.trades.filter(t => t.result !== 'PENDING');
  const wins = resolved.filter(t => t.result === 'WON').length;
  const losses = resolved.filter(t => t.result === 'LOST').length;
  const pending = data.trades.filter(t => t.result === 'PENDING').length;
  const realizedPnl = resolved.reduce((s, t) => s + (t.pnl || 0), 0);

  const cards = [
    { label: 'Portfolio', value: '$' + (data.portfolio_history && data.portfolio_history.length ? data.portfolio_history[data.portfolio_history.length-1].total.toFixed(2) : data.current_balance.toFixed(2)), cls: 'blue' },
    { label: 'Cash', value: '$' + data.current_balance.toFixed(2), cls: 'green' },
    { label: 'Positions', value: '$' + (data.portfolio_history && data.portfolio_history.length ? data.portfolio_history[data.portfolio_history.length-1].positions_value.toFixed(2) : '0.00'), cls: 'yellow' },
    { label: 'Total P&L', value: (realizedPnl >= 0 ? '+' : '') + '$' + realizedPnl.toFixed(2), cls: realizedPnl >= 0 ? 'green' : 'red' },
    { label: 'Win Rate', value: wins + '/' + (wins + losses), cls: wins > 0 ? 'green' : 'red' },
    { label: 'Pending', value: pending, cls: 'yellow' },
  ];
  const cardsEl = document.getElementById('summary-cards');
  cards.forEach(c => {
    cardsEl.innerHTML += `<div class="card"><div class="label">${c.label}</div><div class="value ${c.cls}">${c.value}</div></div>`;
  });

  // Trades table
  const tbody = document.querySelector('#trades-table tbody');
  data.trades.forEach(t => {
    const forecast = Object.entries(t.forecast_at_entry).map(([k,v]) => `${k}:${v}`).join(' / ');
    const statusCls = t.result === 'WON' ? 'won' : t.result === 'LOST' ? 'lost' : 'pending';
    const pnlStr = t.pnl !== null ? (t.pnl >= 0 ? '+$' + t.pnl.toFixed(2) : '-$' + Math.abs(t.pnl).toFixed(2)) : '—';
    const pnlCls = t.pnl > 0 ? 'color:#3fb950' : t.pnl < 0 ? 'color:#f85149' : '';
    const lesson = t.lesson ? `<br><span class="lesson">📝 ${t.lesson}</span>` : '';
    tbody.innerHTML += `<tr>
      <td>${t.id}</td>
      <td>${t.date}</td>
      <td><strong>${t.market}</strong><br><span style="color:#8b949e;font-size:0.8em">${t.city}</span></td>
      <td style="color:#58a6ff">${t.resolve_date}</td>
      <td>${t.shares}</td>
      <td>$${t.cost.toFixed(2)}</td>
      <td style="font-size:0.75em">${forecast}</td>
      <td>${t.actual !== null ? t.actual + '°' : '—'}</td>
      <td style="${pnlCls};font-weight:700">${pnlStr}</td>
      <td><span class="badge ${statusCls}">${t.result}</span></td>
      <td><span class="reason">${t.reason}${lesson}</span></td>
      <td>${t.market_url ? `<a href="${t.market_url}" target="_blank" style="color:#58a6ff;text-decoration:none;font-size:0.8em">🔗</a>` : '—'}</td>
    </tr>`;
  });

  // Strategy
  document.getElementById('strategy-title').textContent = '🧠 ' + (data.strategy_version || 'Strategy');
  const stratEl = document.getElementById('strategy-list');
  data.strategy_rules.forEach(r => {
    stratEl.innerHTML += `<li>${r}</li>`;
  });

  // Changelog
  if (data.strategy_changelog) {
    const clEl = document.getElementById('strategy-changelog');
    clEl.innerHTML = '<h3 style="font-size:0.9em;color:#8b949e;margin-bottom:8px">📋 Changelog</h3>';
    data.strategy_changelog.forEach(c => {
      clEl.innerHTML += `<div style="font-size:0.8em;color:#8b949e;padding:4px 0;border-left:2px solid #30363d;padding-left:8px;margin-bottom:4px"><strong>${c.version}</strong> (${c.date}): ${c.changes}</div>`;
    });
  }

  // Backtest
  const btEl = document.getElementById('backtest-grid');
  const models = [
    { name: 'ECMWF', emoji: '🏆', color: '#3fb950' },
    { name: 'GFS', emoji: '🥈', color: '#58a6ff' },
    { name: 'ICON', emoji: '🥉', color: '#d29922' },
  ];
  models.forEach(m => {
    const d = data.backtest_summary[m.name];
    btEl.innerHTML += `<div class="bt-card">
      <div class="model">${m.emoji} ${m.name}</div>
      <div class="stat">MAE: ${d.MAE}°</div>
      <div class="stat">Match: ${d.match_rate}</div>
      <div class="stat">H2H Wins: ${d.wins}</div>
      <div class="chart-bar" style="background:${m.color};width:${parseFloat(d.wins)*2.5}%"></div>
    </div>`;
  });

  document.getElementById('updated').textContent = 'Last updated: ' + data.last_updated;
});
</script>
</body>
</html>
